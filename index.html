<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patron Çarx</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="logo">
        <div class="crown">♛</div>
        <h2>PATRON KAZINO</h2>
      </div>

      <p class="pretitle">Minimum 20 AZN depozit et</p>
      <h1>Çarxı Fırlat</h1>
      <p class="subtitle">Bonus şansını əldə et və oyuna daha güclü başla.</p>

      <div class="wheel-wrap">
        <div class="pointer"></div>
        <canvas id="wheel" width="360" height="360"></canvas>
        <button id="spinBtn" class="spin-center">FIRLAT</button>
      </div>

      <div id="result" class="result">Şansını yoxlamağa hazırsan?</div>

      <button id="mainBtn" class="main-btn">Minimum 20 AZN Depozit Et</button>

      <p class="note">Hər istifadəçi üçün çarx fırlatma şansı depozitdən sonra aktiv olur.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
